    <radialGradient id="bk-a" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd9c2" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffd9c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bk-b" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4b8c8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f4b8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bk-c" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e6c178" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e6c178" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="120" cy="110" r="120" fill="url(#bk-a)"/>
  <circle cx="520" cy="90" r="150" fill="url(#bk-b)"/>
  <circle cx="430" cy="380" r="170" fill="url(#bk-c)"/>
