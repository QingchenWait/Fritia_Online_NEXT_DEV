<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle paper grain. Tiled as a low-opacity overlay to give Otome panels a tactile, non-flat-but-still-flat feel. -->
  <filter id="pg-noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.24  0 0 0 0 0.30  0 0 0 0.6 0"/>
  </filter>
  <rect width="200" height="200" filter="url(#pg-noise)" opacity="0.5"/>
</svg>
