<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft warm bloom sprite. Use as a background-image behind headers / accent points. -->
  <defs>
    <radialGradient id="gs-bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd9c2" stop-opacity="0.9"/>
      <stop offset="0.35" stop-color="#f4b8c8" stop-opacity="0.45"/>
      <stop offset="0.7" stop-color="#e58aa6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#e58aa6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#gs-bloom)"/>
</svg>
